<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="600" height="720" viewBox="0 0 600 720">

    <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7"
            refX="9" refY="3.5" orient="auto" markerUnits="userSpaceOnUse">
        <polygon points="0 0, 10 3.5, 0 7" fill="#444"/>
    </marker>
    </defs>

    <rect width="600" height="720" fill="#f8f9fa" rx="4"/>

    <text x="300" y="24" text-anchor="middle"
        font-family="sans-serif" font-size="15" font-weight="bold" fill="#222">
    Parcel Translation
    </text>

    <!-- *.c source files (folded corner, [Parcel] subtitle) -->
    <polygon points="85,42 207,42 225,60 225,108 85,108"
            fill="#fffde7" stroke="#f9a825" stroke-width="1.5"/>
    <polygon points="207,42 225,60 207,60"
            fill="#f9a825" fill-opacity="0.3" stroke="#f9a825" stroke-width="1"/>
    <text x="155" y="71" text-anchor="middle"
        font-family="monospace" font-size="15" font-weight="bold" fill="#444">*.c</text>
    <text x="155" y="88" text-anchor="middle"
        font-family="sans-serif" font-size="8" fill="#888">[Parcel] source files</text>

    <!-- *.h header files (folded corner) -->
    <polygon points="375,42 497,42 515,60 515,108 375,108"
            fill="#e8f5e9" stroke="#43a047" stroke-width="1.5"/>
    <polygon points="497,42 515,60 497,60"
            fill="#43a047" fill-opacity="0.3" stroke="#43a047" stroke-width="1"/>
    <text x="445" y="71" text-anchor="middle"
        font-family="monospace" font-size="15" font-weight="bold" fill="#444">*.h</text>
    <text x="445" y="90" text-anchor="middle"
        font-family="sans-serif" font-size="10" fill="#888">header files</text>

    <!-- Arrows: *.c and *.h → Parcel Translator -->
    <line x1="155" y1="108" x2="201" y2="125"
        stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>
    <line x1="445" y1="108" x2="399" y2="125"
        stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>

    <!-- Side paths: *.c and *.h → Preprocess (bypassing Parcel Translator) -->
    <path d="M 85,75 L 48,75 L 48,362 L 173,362"
        fill="none" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>
    <path d="M 515,75 L 552,75 L 552,362 L 427,362"
        fill="none" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>

    <!-- Parcel Translator solid box -->
    <rect x="130" y="125" width="340" height="75" rx="10"
          fill="#e0f2f1" stroke="#00695c" stroke-width="2"/>
    <text x="300" y="168" text-anchor="middle"
        font-family="sans-serif" font-size="13" font-weight="bold" fill="#00695c">Parcel Translator</text>

    <!-- Arrows: Parcel Translator → folder icons -->
    <line x1="300" y1="200" x2="175" y2="234"
        stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>
    <line x1="300" y1="200" x2="425" y2="234"
        stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>

    <!-- export folder icon (darker green) -->
    <path d="M 95,234 L 95,222 L 145,222 L 145,234 L 215,234 L 215,280 L 95,280 Z"
          fill="#c8e6c9" stroke="#2e7d32" stroke-width="1.5"/>
    <text x="155" y="253" text-anchor="middle"
        font-family="monospace" font-size="10" font-weight="bold" fill="#1b5e20">_parcel/export/</text>
    <text x="155" y="268" text-anchor="middle"
        font-family="monospace" font-size="9" fill="#33691e">...&lt;parcel&gt;</text>

    <!-- import folder icon (darker green) -->
    <path d="M 385,234 L 385,222 L 435,222 L 435,234 L 505,234 L 505,280 L 385,280 Z"
          fill="#c8e6c9" stroke="#2e7d32" stroke-width="1.5"/>
    <text x="445" y="253" text-anchor="middle"
        font-family="monospace" font-size="10" font-weight="bold" fill="#1b5e20">_parcel/import/</text>
    <text x="445" y="268" text-anchor="middle"
        font-family="monospace" font-size="9" fill="#33691e">...&lt;parcel&gt;.&lt;stem&gt;</text>

    <!-- Arrows: folder icons → Preprocess -->
    <line x1="155" y1="280" x2="253" y2="339"
        stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>
    <line x1="445" y1="280" x2="347" y2="339"
        stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>

    <!-- "Compiler" enclosing dashed box -->
    <rect x="108" y="300" width="384" height="295" rx="14"
          fill="none" stroke="#999" stroke-width="1.5" stroke-dasharray="8,5"/>
    <text x="300" y="318" text-anchor="middle"
        font-family="sans-serif" font-size="12" font-weight="bold" fill="#999">C Compiler</text>

    <!-- Preprocess stage -->
    <ellipse cx="300" cy="365" rx="128" ry="28"
            fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
    <text x="300" y="360" text-anchor="middle"
        font-family="sans-serif" font-size="13" font-weight="bold" fill="#1565c0">Preprocess</text>
    <text x="300" y="378" text-anchor="middle"
        font-family="monospace" font-size="9.5" fill="#1976d2">cc -E -I _parcel source.c -o source.i</text>

    <!-- Arrow: Preprocess → *.i -->
    <line x1="300" y1="393" x2="300" y2="432"
        stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>

    <!-- *.i translation units (plain rect, no fold) -->
    <rect x="228" y="434" width="144" height="48"
          fill="#fff3e0" stroke="#ef6c00" stroke-width="1.5" rx="3"/>
    <text x="300" y="454" text-anchor="middle"
        font-family="monospace" font-size="14" font-weight="bold" fill="#444">*.i</text>
    <text x="300" y="472" text-anchor="middle"
        font-family="sans-serif" font-size="10" fill="#888">translation units</text>

    <!-- Arrow: *.i → Compile -->
    <line x1="300" y1="482" x2="300" y2="512"
        stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>

    <!-- Compile stage -->
    <ellipse cx="300" cy="540" rx="118" ry="28"
            fill="#f3e5f5" stroke="#6a1b9a" stroke-width="2"/>
    <text x="300" y="535" text-anchor="middle"
        font-family="sans-serif" font-size="13" font-weight="bold" fill="#6a1b9a">Compile</text>
    <text x="300" y="553" text-anchor="middle"
        font-family="monospace" font-size="9.5" fill="#7b1fa2">cc source.i -o main</text>

    <!-- Arrow: Compile → main -->
    <line x1="300" y1="568" x2="300" y2="618"
        stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>

    <!-- main executable (folded corner) -->
    <polygon points="228,620 354,620 372,638 372,686 228,686"
            fill="#e8eaf6" stroke="#283593" stroke-width="2"/>
    <polygon points="354,620 372,638 354,638"
            fill="#283593" fill-opacity="0.3" stroke="#283593" stroke-width="1.5"/>
    <text x="300" y="652" text-anchor="middle"
        font-family="monospace" font-size="16" font-weight="bold" fill="#283593">main</text>
    <text x="300" y="672" text-anchor="middle"
        font-family="sans-serif" font-size="10" fill="#888">executable</text>

</svg>
